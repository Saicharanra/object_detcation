# YOLOv8 Dataset Template Configuration
# Customize this file for your training dataset.

# Path to the root dataset folder (can be relative to where train.py is executed, or absolute)
path: ./yolo_dataset

# Subdirectories for train/val splits
train: images/train
val: images/val
test:  # optional: test images split (e.g. images/test)

# Class dictionary mapping class IDs to names
names:
  0: object
